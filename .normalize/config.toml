# Normalize configuration
# See: https://github.com/rhi-zone/normalize

[daemon]
# enabled = true
# auto_start = true

[analyze]
# clones = true

# [analyze.weights]
# health = 1.0
# complexity = 0.5
# security = 2.0
# clones = 0.3

[walk]
# Project-wide path exclusions (gitignore-style; affects walker AND index).
exclude = [
    ".git/",
    ".normalize/",
]

[aliases]
todo = ["TODO.md"]
